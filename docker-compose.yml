services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: promptcraft-server
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/analytics.db
      - LOG_LEVEL=info
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
    volumes:
      - ./data:/app/data
      - ./docs:/app/docs
      # 注意：不挂载 ./server/src，让代码编译在镜像内完成
    networks:
      - promptcraft-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: promptcraft-client
    ports:
      - "8082:80"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:3001/api
    depends_on:
      server:
        condition: service_healthy
    networks:
      - promptcraft-network
    restart: unless-stopped

networks:
  promptcraft-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16